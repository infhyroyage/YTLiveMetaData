name: Dependabot Lambda Build

on:
  pull_request:
    paths:
      - pyproject.toml
      - uv.lock

permissions:
  contents: read

concurrency:
  group: dependabot-lambda-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lambda-build:
    name: SAM Lambda Build
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Export runtime requirements to Lambda directories
        run: |
          for dir in get_notify post_notify websub post_pipeline; do
            uv export --frozen --no-dev --no-emit-project --no-hashes --no-header --no-annotate \
              -o "lambdas/${dir}/requirements.txt"
          done

      - name: Build Lambda functions
        env:
          SAM_CLI_BETA_PYTHON_UV: "1"
        run: uv run sam build --beta-features --template templates/sam.yml
